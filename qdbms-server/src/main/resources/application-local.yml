# ============================================
# 本地模式配置 — 使用 H2 内嵌数据库
# 启动: mvn spring-boot:run -Dspring-boot.run.profiles=local
# ============================================

server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/qdbms;MODE=MySQL;NON_KEYWORDS=USER,ROLE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      schema-locations: classpath:db/init-h2.sql
      continue-on-error: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: qdbms-local-dev-secret-key-at-least-256-bits
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn
