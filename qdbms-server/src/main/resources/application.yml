server:
  port: 8080

spring:
  application:
    name: qdbms-server
  profiles:
    active: local   # 默认本地模式（H2），云端部署覆盖为 mysql

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/qdbms?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}

  sql:
    init:
      mode: never
      schema-locations: classpath:db/init.sql

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT 配置
jwt:
  secret: ${JWT_SECRET:qdbms-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: 86400000

# Knife4j API 文档
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
