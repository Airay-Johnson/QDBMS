name: Build Release + Docker Package

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-backend:
    name: Build Spring Boot JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -DskipTests -P local -f qdbms-server/pom.xml

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: qdbms-server-jar
          path: qdbms-server/target/*.jar

  build-frontend:
    name: Build Vue Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: qdbms-web/package-lock.json

      - name: Install & Build
        run: |
          cd qdbms-web
          npm ci --legacy-peer-deps
          npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: qdbms-web-dist
          path: qdbms-web/dist/

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: qdbms-server-jar
          path: qdbms-server/target/

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: qdbms-web-dist
          path: qdbms-web/dist/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-backend]
    permissions:
      contents: write
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: qdbms-server-jar

      - name: Find JAR file
        id: jar
        run: |
          JAR=$(ls *.jar | head -1)
          echo "path=$JAR" >> $GITHUB_OUTPUT
          echo "name=$JAR" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## QDBMS ${{ github.ref_name }}

            ### 下载
            - `${{ steps.jar.outputs.name }}` — 后端 JAR 包（需 JDK 17+）
            - Docker 镜像：`docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}`

            ### 快速启动
            ```bash
            java -jar ${{ steps.jar.outputs.name }}
            # 浏览器打开 http://localhost:8080
            # 管理员 admin / admin123
            ```
          files: ${{ steps.jar.outputs.path }}
          generate_release_notes: true
